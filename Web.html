<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Bãi Đỗ Xe</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <style>
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent-blue: #2563eb;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #dc2626;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 40px 20px; 
            margin: 0;
            text-align: center;
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.08); 
            max-width: 450px; 
            margin: 0 auto; 
        }

        h1 { 
            margin-bottom: 30px; 
            font-weight: 600; 
        }

        h2 { 
            margin-top: 0; 
            color: var(--text-muted); 
            font-size: 16px; 
            text-transform: uppercase; 
        }
        
        .big-number { 
            font-size: 60px; 
            font-weight: bold; 
            color: var(--accent-blue); 
            margin: 20px 0; 
        }

        .status-box {
            background-color: #f1f5f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .barrier-scene {
            background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 16px 14px;
            margin-bottom: 24px;
        }

        .barrier-label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 10px;
        }

        .barrier-track {
            height: 10px;
            background: repeating-linear-gradient(
                90deg,
                #9ca3af,
                #9ca3af 8px,
                #6b7280 8px,
                #6b7280 16px
            );
            border-radius: 999px;
            margin-top: 10px;
        }

        .barrier-wrapper {
            position: relative;
            height: 72px;
            display: flex;
            align-items: flex-end;
        }

        .barrier-post {
            width: 16px;
            height: 54px;
            border-radius: 6px;
            background: linear-gradient(180deg, #374151 0%, #111827 100%);
            box-shadow: inset -2px 0 2px rgba(255,255,255,0.2);
        }

        .barrier-arm {
            position: absolute;
            left: 14px;
            bottom: 42px;
            width: 190px;
            height: 10px;
            border-radius: 999px;
            transform-origin: 4px 50%;
            transform: rotate(-2deg);
            background: repeating-linear-gradient(
                90deg,
                #ef4444,
                #ef4444 16px,
                #ffffff 16px,
                #ffffff 32px
            );
            box-shadow: 0 2px 8px rgba(0,0,0,0.16);
            transition: transform 0.9s cubic-bezier(0.2, 0.75, 0.2, 1);
        }

        .barrier-arm::after {
            content: "";
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #111827;
        }

        .barrier-arm.up {
            transform: rotate(-72deg);
        }

        .barrier-arm.down {
            transform: rotate(-2deg);
        }

        .barrier-arm.moving {
            animation: barrierPulse 0.6s ease-in-out;
        }

        @keyframes barrierPulse {
            0% { filter: drop-shadow(0 0 0 rgba(37, 99, 235, 0)); }
            50% { filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.45)); }
            100% { filter: drop-shadow(0 0 0 rgba(37, 99, 235, 0)); }
        }

        .status-text { 
            font-size: 22px; 
            font-weight: 600; 
            color: var(--text-main); 
            margin-bottom: 10px; 
        }

        .info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 15px; 
            color: var(--text-muted); 
        }

        .btn-exit { 
            background-color: var(--warning); 
            color: white; 
            border: none; 
            padding: 16px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            width: 100%; 
            transition: 0.2s;
        }

        .btn-exit:hover { 
            background-color: #d97706; 
        }

        .color-success { color: var(--success); }
        .color-warning { color: var(--warning); }
        .color-danger { color: var(--danger); }

        .connection-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            background: var(--danger);
            margin-right: 6px;
        }

        .online {
            background: var(--success);
        }
    </style>
</head>

<body>

<h1>
    <span id="conn-dot" class="connection-indicator"></span>
    TRUNG TÂM QUẢN LÝ ĐỖ XE
</h1>

<div class="card">

    <h2>SỨC CHỨA BÃI</h2>

    <div class="big-number">
        <span id="car-val">0</span> /
        <span id="max-val">5</span>
    </div>

    <div class="status-box">
        <div class="status-text" id="status-val">ĐANG KẾT NỐI...</div>
        <div class="info-row">
            <span>Cảm biến: <b id="dist-val">--</b> cm</span>
            <span id="log-val">Chờ dữ liệu...</span>
        </div>
    </div>

    <button class="btn-exit" onclick="carExit()">🚙 XÁC NHẬN XE RA</button>

</div>

<script>
const client = new Paho.MQTT.Client("broker.emqx.io", 8083, "web_" + Math.random());

const statusEl = document.getElementById("status-val");
const dotEl = document.getElementById("conn-dot");
const carEl = document.getElementById("car-val");
const barrierArmEl = document.getElementById("barrier-arm");

function setStatus(text, type) {
    statusEl.innerText = text;
    statusEl.classList.remove("color-success","color-warning","color-danger");
    if(type) statusEl.classList.add(type);
}

function setBarrierState(state) {
    if (!barrierArmEl) return;

    barrierArmEl.classList.remove("up", "down", "moving");
    barrierArmEl.classList.add(state, "moving");

    setTimeout(function() {
        barrierArmEl.classList.remove("moving");
    }, 650);
}

function updateBarrierByStatus(statusText) {
    if (!statusText) return;

    if (
        statusText.includes("MỞ") ||
        statusText.includes("CHO QUA") ||
        statusText.includes("XE RA") ||
        statusText.includes("SẴN SÀNG")
    ) {
        setBarrierState("up");
        return;
    }

    if (
        statusText.includes("ĐÓNG") ||
        statusText.includes("ĐẦY") ||
        statusText.includes("LỖI") ||
        statusText.includes("MẤT")
    ) {
        setBarrierState("down");
        return;
    }
}

client.onConnectionLost = function () {
    setStatus("MẤT KẾT NỐI", "color-danger");
    setBarrierState("down");
    dotEl.classList.remove("online");
    document.getElementById("log-val").innerText = "Offline";
};

client.onMessageArrived = function (message) {
    try {
        const data = JSON.parse(message.payloadString);

        document.getElementById("car-val").innerText = data.soXe;
        document.getElementById("max-val").innerText = data.maxXe;
        document.getElementById("dist-val").innerText = data.khoangCach;

        carEl.classList.remove("color-danger");

        if (data.trangThai.includes("LỖI")) {
            setStatus(data.trangThai, "color-danger");
            carEl.classList.add("color-danger");
        } 
        else if (data.trangThai.includes("ĐẦY")) {
            setStatus(data.trangThai, "color-warning");
        } 
        else {
            setStatus(data.trangThai, "color-success");
        }

        updateBarrierByStatus(data.trangThai);

    } catch (e) {
        console.log(e);
    }
};

client.connect({
    onSuccess: function () {
        dotEl.classList.add("online");
        setStatus("ĐÃ KẾT NỐI", "color-success");
        setBarrierState("down");
        document.getElementById("log-val").innerText = "Online";
        client.subscribe("tram-kiem-soat/trang-thai");
    }
});

function carExit() {
    const msg = new Paho.MQTT.Message("CAR_EXIT");
    msg.destinationName = "tram-kiem-soat/dieu-khien";
    client.send(msg);
}
</script>

</body>
</html>
